version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: outfix-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: outfix_db
      POSTGRES_USER: outfix_user
      POSTGRES_PASSWORD: outfix_pass_2026
    volumes:
      - outfix_pgdata:/var/lib/postgresql/data
    mem_limit: 512m
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U outfix_user -d outfix_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  outfix_pgdata:
